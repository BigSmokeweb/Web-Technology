<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Manager | PHP + MySQL</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
    <header class="header">
        <div class="logo"><span>📦</span><h1>InventoryPro</h1></div>
        <p>PHP + MySQL Dynamic Inventory Management</p>
    </header>

    <main>
        <!-- Stats -->
        <div class="stats-row">
            <div class="stat-card"><span class="snum" id="statTotal">0</span><span>Total Products</span></div>
            <div class="stat-card"><span class="snum" id="statCategories">0</span><span>Categories</span></div>
            <div class="stat-card"><span class="snum" id="statStock">0</span><span>Total Stock</span></div>
        </div>

        <!-- Search & Filter -->
        <div class="card toolbar">
            <input type="text" id="searchInput" placeholder="🔍 Search products..." oninput="loadProducts()" />
            <select id="categoryFilter" onchange="loadProducts()">
                <option value="">All Categories</option>
                <option value="Electronics">Electronics</option>
                <option value="Furniture">Furniture</option>
                <option value="Stationery">Stationery</option>
                <option value="Clothing">Clothing</option>
                <option value="Other">Other</option>
            </select>
            <button class="btn btn-primary" onclick="openModal()">+ Add Product</button>
        </div>

        <!-- Product Grid -->
        <div id="productGrid" class="product-grid"></div>
    </main>

    <!-- Modal -->
    <div id="modal" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">Add Product</h3>
                <button class="close-btn" onclick="closeModal()">✕</button>
            </div>
            <form id="productForm" onsubmit="submitProduct(event)">
                <input type="hidden" id="editId" />
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" id="pName" placeholder="e.g. Wireless Mouse" required />
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Category</label>
                        <select id="pCategory" required>
                            <option value="">Select...</option>
                            <option>Electronics</option>
                            <option>Furniture</option>
                            <option>Stationery</option>
                            <option>Clothing</option>
                            <option>Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Price (₹)</label>
                        <input type="number" id="pPrice" placeholder="0.00" step="0.01" min="0" required />
                    </div>
                </div>
                <div class="form-group">
                    <label>Quantity in Stock</label>
                    <input type="number" id="pQty" placeholder="0" min="0" required />
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="pDesc" placeholder="Product description..." rows="3"></textarea>
                </div>
                <div id="formMsg" class="message hidden"></div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" id="submitBtn">Add Product</button>
                    <button type="button" class="btn btn-ghost" onclick="closeModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
