<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Checker | Math Learning App</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="bg-glow"></div>
<div class="app">
    <header>
        <div class="icon">🔢</div>
        <h1>Prime Checker</h1>
        <p>Discover whether any number is prime — instantly</p>
    </header>

    <div class="card main-card">
        <label class="field-label">Enter a Number</label>
        <div class="input-row">
            <input type="number" id="numInput" placeholder="e.g. 97" min="0" max="999999"
                   oninput="clearResult()" onkeydown="if(event.key==='Enter') checkPrime()" />
            <button id="checkBtn" onclick="checkPrime()">Check</button>
        </div>
        <div id="result" class="result hidden"></div>
        <div id="steps" class="steps hidden"></div>
    </div>

    <!-- History -->
    <div class="card history-card">
        <div class="hist-header">
            <h3>📜 Check History</h3>
            <button class="btn-clear" onclick="clearHistory()">Clear</button>
        </div>
        <div id="historyList" class="history-list">
            <p class="empty-hist">No checks yet. Enter a number above!</p>
        </div>
    </div>

    <!-- Fun Facts -->
    <div class="card facts-card">
        <h3>💡 Prime Number Facts</h3>
        <div class="facts-grid">
            <div class="fact"><strong>2</strong><span>Only even prime</span></div>
            <div class="fact"><strong>∞</strong><span>Primes are infinite</span></div>
            <div class="fact"><strong>1</strong><span>NOT a prime number</span></div>
            <div class="fact"><strong>97</strong><span>Largest 2-digit prime</span></div>
        </div>
    </div>

    <!-- First 20 Primes -->
    <div class="card primes-card">
        <h3>🔑 First 20 Prime Numbers</h3>
        <div class="primes-row" id="primesList"></div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
