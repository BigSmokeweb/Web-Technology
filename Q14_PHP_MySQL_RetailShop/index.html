<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetailShop | PHP + MySQL Inventory</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
    <header>
        <div class="logo"><span>🛒</span><h1>RetailShop Manager</h1></div>
        <p>PHP + MySQL Product Inventory — Add, View, Update, Delete</p>
    </header>

    <div class="toolbar card">
        <input type="text" id="searchInput" placeholder="🔍 Search by name or ID..." oninput="filterProducts()" />
        <button class="btn btn-primary" onclick="openModal()">+ Add Product</button>
    </div>

    <!-- Stats -->
    <div class="stats-row">
        <div class="stat-card"><span class="sn" id="statTotal">0</span><label>Products</label></div>
        <div class="stat-card"><span class="sn" id="statStock">0</span><label>Total Stock</label></div>
        <div class="stat-card"><span class="sn" id="statVal">₹0</span><label>Total Value</label></div>
    </div>

    <!-- Product Table -->
    <div class="card table-card">
        <table id="productTable">
            <thead><tr><th>Product ID</th><th>Name</th><th>Price (₹)</th><th>Quantity</th><th>Stock Status</th><th>Actions</th></tr></thead>
            <tbody id="tableBody"><tr><td colspan="6" class="empty">Loading products...</td></tr></tbody>
        </table>
    </div>
</div>

<!-- Modal -->
<div id="modal" class="modal-overlay hidden">
    <div class="modal">
        <div class="modal-header">
            <h3 id="modalTitle">Add Product</h3>
            <button onclick="closeModal()" class="close-btn">✕</button>
        </div>
        <form id="productForm" onsubmit="submitProduct(event)">
            <input type="hidden" id="editId" />
            <div class="fg"><label>Product Name</label><input type="text" id="pName" placeholder="e.g. Wireless Mouse" required /></div>
            <div class="form-row">
                <div class="fg"><label>Price (₹)</label><input type="number" id="pPrice" placeholder="0.00" step="0.01" min="0" required /></div>
                <div class="fg"><label>Quantity</label><input type="number" id="pQty" placeholder="0" min="0" required /></div>
            </div>
            <div id="modalMsg" class="msg hidden"></div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary" id="modalSubmit">Add Product</button>
                <button type="button" class="btn btn-ghost" onclick="closeModal()">Cancel</button>
            </div>
        </form>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
